---
name: Validate K8s Manifests

on:
  pull_request:
    paths:
      - 'k8s/**'
  push:
    branches:
      - main
    paths:
      - 'k8s/**'

jobs:
  validate:
    runs-on: gha-runner-scale-set-home-ops
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run validation
        run: bash k8s/scripts/validate.sh --all
