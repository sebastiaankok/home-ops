  enabled: true
  leaseDuration: "120s"
  leaseRenewDeadline: "60s"
  leaseRetryPeriod: "10s"
externalIPs:
  enabled: true

kubeProxyReplacement: true
# ipv4NativeRoutingCIDR: 10.10.0.0/16

k8sServiceHost: 127.0.0.1
k8sServicePort: "6443"

bpf:
  masquerade: true
