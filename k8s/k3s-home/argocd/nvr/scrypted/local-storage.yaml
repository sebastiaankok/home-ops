apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-scrypted-pv
  namespace: nvr
  labels:
    app.kubernetes.io/name: scrypted
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  storageClassName: local-scrypted
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  local:
    path: "/data/scrypted"
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k3s-home
                - b660-i5-13600
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: local-scrypted-pvc
  namespace: nvr
  labels:
    app.kubernetes.io/name: scrypted
spec:
  storageClassName: local-scrypted
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi