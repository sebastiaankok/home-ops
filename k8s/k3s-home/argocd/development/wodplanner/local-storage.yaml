apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-wodplanner-pv
  namespace: wodplanner
  labels:
    app.kubernetes.io/name: wodplanner
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  storageClassName: local-wodplanner
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  local:
    path: "/data/wodplanner"
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k3s-home
                - b660-i5-13600
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: local-wodplanner-pvc
  namespace: wodplanner
  labels:
    app.kubernetes.io/name: wodplanner
spec:
  storageClassName: local-wodplanner
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
