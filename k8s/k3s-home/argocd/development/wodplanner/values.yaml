# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/library/common/values.schema.json
---
controllers:
  wodplanner:
    replicas: 1
    containers:
      app:
        image:
          repository: ghcr.io/sebastiaankok/wodplanner
          tag: latest
        env:
          TZ: Europe/Amsterdam
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            memory: 256Mi
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
service:
  app:
    controller: wodplanner
    ports:
      http:
        port: 8080
ingress:
  app:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-dns
      gethomepage.dev/enabled: "true"
    hosts:
      - host: wod.otohgunga.nl
        paths:
          - path: /
            service:
              identifier: app
              port: http
            pathType: Prefix
    tls:
      - hosts:
          - wod.otohgunga.nl
        secretName: wod-https-tls
persistence:
  config:
    enabled: true
    existingClaim: local-wodplanner-pvc
    globalMounts:
      - path: /data
