apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cloudflared-egress-policy
  namespace: cloudflared

spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: cloudflared

  egress:

    # -----------------------
    # DNS
    # -----------------------
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY

    # -----------------------
    # wodplanner namespace only
    # -----------------------
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: wodplanner

    # -----------------------
    # Cloudflare tunnel (CRITICAL)
    # -----------------------
    - toFQDNs:
        - matchPattern: "*.cloudflare.com"
        - matchPattern: "*.argotunnel.com"
        - matchPattern: "*.cfargotunnel.com"

    # -----------------------
    # Explicit Cloudflare edge ports
    # (needed because tunnel uses 7844)
    # -----------------------
    - toPorts:
        - ports:
            - port: "7844"
              protocol: TCP
            - port: "7844"
              protocol: UDP
