---
controllers:
  cloudflared:
    replicas: 2
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: mirror.gcr.io/cloudflare/cloudflared
          tag: 2026.6.1@sha256:6d91c121b803126f7a5344005d17a9324788fc09d305b6e2560ec6040a7ae283
        args:
          - tunnel
          - run
        env:
          NO_AUTOUPDATE: true
          TUNNEL_TRANSPORT_PROTOCOL: http2
          TUNNEL_TOKEN:
            valueFrom:
              secretKeyRef:
                name: cloudflared-secret
                key: tunnel-token
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: ["ALL"]}
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
