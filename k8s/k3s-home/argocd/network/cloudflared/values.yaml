---
controllers:
  cloudflared:
    replicas: 2
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: mirror.gcr.io/cloudflare/cloudflared
          tag: 2026.5.0@sha256:59bab8d3aceec09bf6bdb07d6beca0225ca5cd7ab79436a87ea97978fe1dc4f9
        args:
          - tunnel
          - run
        env:
          NO_AUTOUPDATE: true
          TUNNEL_TRANSPORT_PROTOCOL: http2
          TUNNEL_TOKEN:
            valueFrom:
              secretKeyRef:
                name: cloudflared-secret
                key: tunnel-token
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: ["ALL"]}
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
