---
controllers:
  cloudflared:
    replicas: 2
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: mirror.gcr.io/cloudflare/cloudflared
          tag: 2026.3.0@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
        args:
          - tunnel
          - run
        env:
          NO_AUTOUPDATE: true
          TUNNEL_TRANSPORT_PROTOCOL: http2
          TUNNEL_TOKEN:
            valueFrom:
              secretKeyRef:
                name: cloudflared-secret
                key: tunnel-token
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: ["ALL"]}
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
